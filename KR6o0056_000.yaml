front:
  text: 緣生論序原是一心積為三界癡流漫遠苦樹鬱高欲討其際難測其本理極實相之門筌窮假名之域五因七果十有二分緣生之法總備於此凡則迷而起妄聖則悟以通真下似免浮上如象度大哉妙覺淵乎洞盡十地與雙林俱暢聞城共稻芉咸敷至若此經獨苞彼例彼所未説此乃具演攀緣為首對治為末總則一十一門別則百二十問其旨微而密其詞約而隱經之綱目攝在茲焉并有聖者鬱楞迦附此經旨作論顯發其論也遍取三乘之意不執一部之筌先立偈章後興論釋偈有三十故亦名三十論也大業二年十月南賢豆國舊名天竺者訛也三藏法師達磨笈多與故翻經法師彥琮在東都上林園依林邑所獲賢豆梵本譯為隋言三年九月其功乃竟經二卷論一卷三藏師究論間明義解沈密琮法師博通經論兼善梵文共對葉本更相扣擊一言靡遺三覆逾審辭頗簡質意存允正比之昔人差無尤失真曰法燈足稱智藏願窮後際常益世間云爾
